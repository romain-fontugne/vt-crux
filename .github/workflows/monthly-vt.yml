name: Monthly VirusTotal Collection

on:
  schedule:
    - cron: "0 3 15 * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: virustotal-monthly
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Refresh domain inventory
        run: |
          python scripts/build_domain_inventory.py
        env:
          PYTHONPATH: scripts
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Query VirusTotal
        run: |
          python scripts/query_vt_batch.py
        env:
          PYTHONPATH: scripts
          VT_API_KEY: ${{ secrets.VT_API_KEY }}

      - name: Commit updates
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add data

          git diff --cached --quiet || (
            git commit -m "Monthly VT update"
            git push
          )

